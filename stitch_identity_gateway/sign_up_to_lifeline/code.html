<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LifeLine - Sign Up</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00a89d",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2322",
                        "charcoal": "#333333",
                        "mist-grey": "#F0F4F3"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.75rem", // Mapped to 12px
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mist-grey dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-6">
<!-- Main Container (Mobile focused) -->
<div class="w-full max-w-md bg-mist-grey dark:bg-background-dark flex flex-col gap-8">
<!-- Header Section -->
<div class="flex flex-col items-center text-center gap-4">
<!-- Medical Heartbeat Icon -->
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">ecg_heart</span>
</div>
<h1 class="text-charcoal dark:text-slate-100 text-2xl font-bold tracking-tight">Create your account</h1>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-4" onsubmit="return false;">
<!-- Full Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-charcoal/70 dark:text-slate-400 ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-charcoal/40 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="block w-full h-14 pl-12 pr-4 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-charcoal dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-charcoal/70 dark:text-slate-400 ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-charcoal/40 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full h-14 pl-12 pr-4 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-charcoal dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-charcoal/70 dark:text-slate-400 ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-charcoal/40 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full h-14 pl-12 pr-12 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-charcoal dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-charcoal/40 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-charcoal/70 dark:text-slate-400 ml-1">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-charcoal/40 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full h-14 pl-12 pr-4 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-charcoal dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-base" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 mt-4 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                Sign Up
            </button>
</form>
<!-- Security Badge (Sterile Feel) -->
<div class="flex items-center justify-center gap-2 text-charcoal/40 dark:text-slate-500 text-xs uppercase tracking-widest font-bold">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span>Secure SSL Encrypted</span>
</div>
<!-- Footer Section -->
<div class="mt-4 text-center">
<p class="text-charcoal/60 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Background Illustration Elements (Sterile, subtle) -->
<div class="fixed bottom-0 left-0 w-full h-1 opacity-20 bg-gradient-to-r from-transparent via-primary to-transparent pointer-events-none"></div>
<div class="fixed top-12 left-12 w-32 h-32 rounded-full bg-primary/5 blur-3xl pointer-events-none"></div>
<div class="fixed bottom-12 right-12 w-48 h-48 rounded-full bg-primary/5 blur-3xl pointer-events-none"></div>
</body></html>
